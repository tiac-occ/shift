<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OCC Duty Management Platform</title>
   
<style>
/* --- 【新增】1. 精準版紅包雨特效 --- */
.red-envelope {
  position: fixed; top: -50px; z-index: 9998; 
  pointer-events: none; /* 讓滑鼠點擊穿透紅包，不影響操作 */
  user-select: none; font-size: 26px; 
  animation: envelope-fall linear forwards;
}

/* 掉落到藍色 Header 下緣 (大約 140px) 就消失，不干擾班表 */
@keyframes envelope-fall {
  0% { transform: translateY(-50px) rotate(0deg) translateX(0); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(140px) rotate(180deg) translateX(20px); opacity: 0; }
}

/* --- 【新增】2. 公事包與標題的精準置中網格 (水平與垂直完美對齊) --- */
.calendar-section-header {
  display: grid; 
  grid-template-columns: repeat(7, 1fr); /* 星期六垂直對齊依據 */
  height: 40px; margin-bottom: 15px; position: relative;
}

/* 標題與圖標層：強制幾何中心對齊 */
.title-wrapper, .action-wrapper {
  grid-row: 1; display: flex; align-items: center; pointer-events: none;
}

/* 標題層：佔滿七格，幾何置中 */
.title-wrapper { grid-column: 1 / 8; justify-content: center; }
.title-wrapper h3 { 
  margin: 0; color: var(--starlux-header); 
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  line-height: 1; /* 消除文字上下空間，達成絕對幾何中心 */
}

/* 展開時被推擠的特效 */
.title-wrapper h3.pushed { transform: translateX(-110px); }

/* 按鈕層：幾何置中於第 7 格 (六) */
.action-wrapper { grid-column: 7; justify-content: center; position: relative; }

/* 隱藏的數據面板 */
.stats-panel {
  display: flex; align-items: center; gap: 6px; background-color: #fff;
  padding: 0; width: 0; height: 34px; border-radius: 20px; overflow: hidden;
  box-shadow: var(--shadow); opacity: 0; 
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  white-space: nowrap; border: 1px solid transparent;
  position: absolute; right: 36px; z-index: 10; pointer-events: auto;
}
.stats-panel.show { width: auto; padding: 0 8px; opacity: 1; border-color: var(--border-color); }

.stat-mini { display: flex; align-items: center; font-size: 0.9em; font-weight: bold; color: #555; line-height: 1;}
.dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; display: inline-block; }
.dot.day { background-color: #AD9F74; } .dot.night { background-color: #3E4B5C; } .dot.off { background-color: #28a745; }

/* 選項 B: 圓環統計圖按鈕設計 */
.icon-btn {
  display: flex; justify-content: center; align-items: center; box-sizing: border-box;
  width: 34px; height: 34px; border: 1.5px solid #AD9F74; border-radius: 50%;
  background: transparent; cursor: pointer; color: #AD9F74; pointer-events: auto; /* 恢復按鈕點擊 */
  transition: all 0.2s; padding: 0; outline: none; -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { background: rgba(173, 159, 116, 0.1); transform: scale(1.05); }
.icon-btn:active { transform: scale(0.95); }
.icon-btn svg { width: 18px; height: 18px; stroke-width: 2px; }

/* --- 【新增】3. MY CREW 專屬高亮樣式 --- */
.assignment-row.current-duty-group { 
  border: 2px solid var(--starlux-highlight-b); background-color: rgba(173, 159, 116, 0.1); 
  border-radius: 8px; padding: 8px 15px; margin: 5px 15px 10px 15px; position: relative; 
  box-shadow: 0 0 10px rgba(173, 159, 116, 0.3);
}
.assignment-row.current-duty-group::after { 
  content: 'MY CREW'; position: absolute; top: 0; right: 0; 
  background-color: var(--starlux-highlight-b); color: white; 
  font-size: 0.75em; padding: 3px 10px; border-radius: 0 6px 0 6px; font-weight: bold; letter-spacing: 1px;
}

/* --- 原有樣式開始 --- */
.calendar-day.has-note::after { content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 12px 12px 0; border-color: transparent #e74c3c transparent transparent; z-index: 5;}
#noteModal textarea { width: 100%; height: 150px; padding: 10px; font-size: 1.1em; border: 1px solid var(--border-color); border-radius: 8px; resize: none; box-sizing: border-box; margin-bottom: 15px; font-family: inherit;}
#noteModal .modal-actions { display: flex; gap: 10px; }
#btn-delete-note { background-color: #dc3545; color: white; flex: 0.5; }
.calendar-day.today { position: relative; }
.calendar-day.today::after { content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 4px outset #CC9B86; border-radius: 8px; box-sizing: border-box; animation: draw-circle 0.5s ease-in-out forwards;}
@keyframes draw-circle { from { transform: scale(1.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.header-top-row { position: relative; width: 100%; min-height: 45px; }
#splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #4A5052; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease-out;}
#splash-screen img { width: 300px; height: 300px; }
#splash-screen.hidden { opacity: 0; pointer-events: none; }

:root { --starlux-header: #3E4B5C; --starlux-teal-light: #e6f0f3; --starlux-gold-light: #f5eeda; --starlux-rose-gold: #f5eeda; --starlux-gray: #f0f2f5; --starlux-highlight-a: #7D8C91; --starlux-highlight-b: #AD9F74; --text-color: #333; --border-color: #d8dde0; --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: var(--starlux-gray); color: var(--text-color); }
#login-container { display: none; justify-content: center; align-items: center; width: 100%; height: 100vh; }
.login-box { max-width: 400px; width: 90%; padding: 30px; background: #fff; border-radius: 12px; box-shadow: var(--shadow); text-align: center; }
.login-box h1 { color: var(--starlux-header); }
#login-form { display: flex; flex-direction: column; gap: 15px; }
.form-field { display: flex; flex-direction: column; text-align: left; }
.form-field label { font-weight: bold; margin-bottom: 5px; color: var(--starlux-header); }
.form-field input, .form-field select { font-size: 1em; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; box-sizing: border-box; }
#login-btn { padding: 12px; font-size: 1.2em; background-color: var(--starlux-header); color: white; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s;}
#login-error { color: #dc3545; margin-top: 15px; min-height: 1.2em; font-size: 0.9em; }
#app-wrapper { display: none; height: 100vh; }
#sidebar { width: 220px; background-color: var(--starlux-header); color: white; padding-top: 20px; display: flex; flex-direction: column; transition: transform 0.3s ease; transform: translateX(-100%); position: fixed; height: 100%; z-index: 2000; }
#sidebar.open { transform: translateX(0); }
#sidebar-header { text-align: center; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
#sidebar-header #user-info { font-weight: bold; word-break: break-all; }
#sidebar-nav { display: flex; flex-direction: column; flex-grow: 1; margin-top: 20px; padding: 0 5px; gap: 10px; }
#sidebar-nav a { color: white; text-decoration: none; padding: 15px 20px; font-size: 1.1em; font-weight: bold; text-align: center; border-radius: 6px; border-left: 3px solid transparent; }
#sidebar-nav a:hover { background-color: rgba(255, 255, 255, 0.1); }
#sidebar-nav a.active { background-color: rgba(0, 0, 0, 0.2); border-left-color: var(--starlux-gold-light); }
#logout-btn { background: none; color: white; text-align: center; border: none; padding: 15px 20px; font-size: 1.1em; cursor: pointer; width: 100%; border-top: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; }
#logout-btn:hover { background-color: rgba(255,255,255,0.1); }
#content-wrapper { width: 100%; height: 100vh; display: flex; flex-direction: column; }
#sidebar-toggle { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; font-size: 2em; cursor: pointer; width: 45px; padding: 0; z-index: 10; }
#overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1999; }
#sidebar.open ~ #overlay { display: block; }
.header { background-color: var(--starlux-header); color: white; padding: 10px 0px 15px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow); }
.month-selector { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 0; }
.month-selector button { background: none; border: 1px solid rgba(255, 255, 255, 0.5); color: white; font-size: 1.5em; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; flex-shrink: 0; display: flex; justify-content: center; align-items: center; padding: 0; padding-bottom: 3px; }
.month-selector h1 { margin: 0 10px; font-size: 1.5em; white-space: nowrap; }
nav.view-selector { display: flex; background-color: rgba(255, 255, 255, 0.8); padding: 5px; border-radius: 8px; margin: 10px auto 0; max-width: 500px; width: 90%; backdrop-filter: blur(5px); }
nav.view-selector button { flex: 1; padding: 10px; font-size: 1em; background: none; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: var(--starlux-header); }
nav.view-selector button.active { background-color: var(--starlux-header); color: white; }
main { padding: 10px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; overflow-y: auto; flex-grow: 1; }
.page { display: none; } .page.active { display: block; }
.view { display: none; } .view.active { display: block; }
#logout-confirm { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 3000; text-align: center; }
#logout-confirm p { margin: 0 0 20px; font-size: 1.2em; }
#logout-confirm button { padding: 10px 20px; font-size: 1em; border: none; border-radius: 8px; cursor: pointer; margin: 0 10px; }
#confirm-logout-yes { background-color: #dc3545; color: white; }
#confirm-logout-no { background-color: #6c757d; color: white; }
.controls { margin-bottom: 15px; text-align: center; display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
.controls label { font-weight: bold; color: var(--starlux-header); }
.controls select { font-size: 1.1em; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); }
.message-box { text-align: center; padding: 20px; margin-top: 15px; margin-bottom: 15px; border-radius: 8px; font-weight: bold; background-color: #e9ecef; max-width: 90%; margin-left: auto; margin-right: auto; }
.message-box.error { background-color: #f8d7da; color: #dc3545; }
.message-box.success { background-color: #d4edda; color: #155724; }
.day-card { background-color: #fff; border-radius: 12px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
.day-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; cursor: pointer; }
.day-header h2 { margin: 0; font-size: 1.2em; color: var(--starlux-header); }
.day-details { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
.day-card.open .day-details { max-height: 1500px; }
.assignment-row { padding: 10px 20px; border-top: 1px solid var(--starlux-gray); }
.assignment-row-title { font-weight: bold; color: #795548; margin-bottom: 8px; font-size: 0.9em; }
.assignment-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.assignment { padding: 8px 10px; border-radius: 6px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
.assignment.day-shift { background-color: var(--starlux-gold-light); }
.assignment.night-shift { background-color: var(--starlux-teal-light); }
.assignment .position { font-size: 0.85em; color: #555; white-space: pre-line; line-height: 1.2; margin-bottom: 4px; flex-grow: 1; display: flex; align-items: center; justify-content: flex-start; text-align: left; }
.assignment .name { font-weight: bold; font-size: 0.95em; color: #000; margin-top: auto; }
.table-container { overflow: auto; max-height: 70vh; border-radius: 8px; box-shadow: var(--shadow); }
.full-roster-table { border-collapse: collapse; width: 100%; text-align: center; table-layout: fixed; }
.full-roster-table th, .full-roster-table td { border: 1px solid var(--border-color); padding: 8px; font-size: 0.9em; white-space: pre-line; width: 45px; }
.full-roster-table th:first-child, .full-roster-table td:first-child { width: 56px; font-size: 0.85em; }
.full-roster-table thead th { position: sticky; top: 0; z-index: 2; }
.full-roster-table tbody td:first-child { position: sticky; left: 0; font-weight: bold; z-index: 1; }
.full-roster-table thead th:first-child { z-index: 3; }
.full-roster-table th.day-shift { background-color: var(--starlux-gold-light); }
.full-roster-table th.night-shift { background-color: var(--starlux-teal-light); }
.full-roster-table thead th:first-child, .full-roster-table tbody td:first-child { background-color: var(--starlux-rose-gold); }
.full-roster-table .highlight-a { background-color: var(--starlux-highlight-a) !important; color: white; font-weight: bold; }
.full-roster-table .highlight-b { background-color: var(--starlux-highlight-b) !important; color: white; font-weight: bold; }
.full-roster-table th:nth-child(3), .full-roster-table td:nth-child(3) { border-right: 2px solid var(--starlux-header); }
.full-roster-table th:nth-child(12), .full-roster-table td:nth-child(12) { border-right: 2px solid var(--starlux-header); }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.calendar-weekday { font-weight: bold; text-align: center; padding: 8px; color: var(--starlux-header); }
.calendar-day { border: 1px solid var(--border-color); border-radius: 8px; min-height: 100px; padding: 5px; background-color: #fff; box-shadow: var(--shadow); position: relative; cursor: pointer; transition: transform 0.1s ease, border-color 0.2s;}
.calendar-day.empty { background-color: transparent; border: none; box-shadow: none; cursor: default; }
.calendar-day .day-number { font-weight: bold; font-size: 0.9em; color: #888; }
.calendar-day .shift-info { font-size: 0.8em; margin-top: 5px; white-space: pre-line; line-height: 1.3; font-weight: bold; }
.calendar-day.day-shift { background-color: var(--starlux-gold-light); }
.calendar-day.night-shift { background-color: var(--starlux-teal-light); }
.calendar-day.day-off { background-color: #fff; }
.form-container { max-width: 600px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 12px; box-shadow: var(--shadow); }
.form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
.submit-btn { padding: 12px; font-size: 1.2em; background-color: var(--starlux-header); color: white; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
#successorView .controls { margin-top: 20px; }
#successor-results { margin-top: 20px; padding: 20px; background: #fff; border-radius: 8px; box-shadow: var(--shadow); }
#successor-list { font-size: 1.1em; line-height: 1.8; }
.comparison-calendar-container { display: grid; grid-template-columns: 1fr; gap: 30px; }
.interactive-calendar .calendar-day:hover { transform: scale(1.02); background-color: rgba(0, 0, 0, 0.02); }
.interactive-calendar .calendar-day[data-has-shift="false"] { cursor: not-allowed; opacity: 0.6; }
.calendar-day.selected-shift { border: 3px solid var(--starlux-header) !important; background-color: rgba(173, 159, 116, 0.15) !important; position: relative; box-shadow: 0 0 10px rgba(62, 75, 92, 0.3); transform: scale(1.05); z-index: 10; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
.modal-box { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; border: 1px solid var(--starlux-gold-light); animation: popIn 0.3s ease-out; }
@keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-content { font-size: 1.2em; margin-bottom: 25px; line-height: 1.6; color: var(--starlux-header); font-weight: bold; }
.modal-actions { display: flex; gap: 15px; justify-content: center; }
.modal-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 1.1em; cursor: pointer; font-weight: bold; }
.btn-cancel { background-color: #d8dde0; color: #555; }
.btn-confirm { background-color: var(--starlux-header); color: white; }
.day-card.today-highlight { border: 3px solid #CC9B86 !important; box-shadow: 0 0 15px rgba(204, 155, 134, 0.5); animation: pulse-border 2s infinite; }
@keyframes pulse-border { 0% { box-shadow: 0 0 10px rgba(204, 155, 134, 0.3); } 50% { box-shadow: 0 0 20px rgba(204, 155, 134, 0.6); } 100% { box-shadow: 0 0 10px rgba(204, 155, 134, 0.3); } }

</style>
</head>
<body>
<div id="splash-screen">
  <img src="icon-512.png" alt="應用程式 Logo">
</div>
<div id="login-container">
  <div class="login-box">
    <h1>OCC 班表管理平台</h1>
    <form id="login-form">
      <div class="form-field"><label for="email">電子郵件</label><input type="email" id="email" required></div>
      <div class="form-field"><label for="password">密碼</label><input type="password" id="password" required></div>
      <button type="submit" id="login-btn">登入</button>
      <p id="login-error"></p>
    </form>
  </div>
</div>

<div id="app-wrapper">
  <div id="sidebar">
    <div id="sidebar-header"><span id="user-info"></span></div>
    <nav id="sidebar-nav">
      <a href="#" data-page="home" class="active">首頁</a>
      <a href="#" data-page="shiftZone">調代專區</a>
      <a href="#" data-page="account">帳號管理</a>
    </nav>
    <button id="logout-btn">登出</button>
  </div>
  <div id="overlay"></div>

  <div id="content-wrapper">
    <header class="header">
      <div class="header-top-row">
        <button id="sidebar-toggle">☰</button>
        <div class="month-selector">
          <button id="prevMonthBtn">&lt;</button>
          <h1 id="monthTitle"></h1>
          <button id="nextMonthBtn">&gt;</button>
        </div>
      </div>
      <nav id="homeViewSelector" class="view-selector" style="display: flex;">
        <button data-view="personalCalendarView" class="active">個人班表</button>
        <button data-view="dailyCardView">每日值班</button>
        <button data-view="fullTableView">全員班表</button>
      </nav>
      <nav id="shiftZoneViewSelector" class="view-selector" style="display: none;">
        <button data-view="shiftChangeView" class="active">調代申請</button>
        <button data-view="successorView">誰來接班</button>
      </nav>
    </header>

    <main>
      <div id="messageContainer"></div>

      <div id="home" class="page active">
        <div id="dailyCardView" class="view"></div>
        <div id="fullTableView" class="view">
          <div class="controls">
            <label for="highlighter1">搜尋1:</label><select id="highlighter1"><option value="">無</option></select>
            <label for="highlighter2">搜尋2:</label><select id="highlighter2"><option value="">無</option></select>
          </div>
          <div id="tableContainer"></div>
        </div>
        <div id="personalCalendarView" class="view active">
          <div class="comparison-calendar-container">
            
            <div class="calendar-section">
              <div class="calendar-section-header" id="myScheduleHeader">
                <div class="title-wrapper">
                  <h3 id="myScheduleTitle">我的班表</h3>
                </div>
                <div class="action-wrapper">
                  <div class="stats-panel" id="myStatsPanel">
                    <div class="stat-mini"><span class="dot day"></span><span id="stat-day">0</span></div>
                    <div class="stat-mini"><span class="dot night"></span><span id="stat-night">0</span></div>
                    <div class="stat-mini"><span class="dot off"></span><span id="stat-off">0</span></div>
                  </div>
                  <button class="icon-btn" onclick="toggleStats()" title="班務統計">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
                      <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
                    </svg>
                  </button>
                </div>
              </div>
              
              <div id="myPersonalCalendarContainer"></div>
            </div>

            <div class="calendar-section">
              <div class="controls">
                <label for="personSelector">對照同仁:</label>
                <select id="personSelector"><option value="">請選擇人員...</option></select>
              </div>
              <div id="colleagueCalendarContainer"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="shiftZone" class="page">
          <div id="shiftChangeView" class="view active">
            <div class="form-container">
              <div id="formMessageContainer"></div>
              <form id="shiftChangeForm" class="form-grid">
                <input type="hidden" id="originalDate" name="originalDate">
                <input type="hidden" id="originalShift" name="originalShift">
                <input type="hidden" id="swappedDate" name="swappedDate">
                <input type="hidden" id="swappedShift" name="swappedShift">

      try { const user = auth.currentUser; if (!user) throw new Error("使用者未登入。"); const credential = firebase.auth.EmailAuthProvider.credential(user.email, currentPassword); await user.reauthenticateWithCredential(credential); await user.updatePassword(newPassword); showMessage('success', '密碼已成功更新！', msgContainer); DOMElements.changePasswordForm.reset(); } catch (error) { showMessage('error', `更換密碼失敗：<br>${error.message}`, msgContainer); } finally { btn.disabled = false; btn.textContent = '確認更換'; }
    }

    // --- 【新增】3. 每日值班 MY CREW 自動判斷與分流邏輯 ---
    function renderDailyCards(scheduleData) {
      const today = new Date(); const currentYear = today.getFullYear(); const currentMonth = today.getMonth(); const currentDay = today.getDate();
      const viewYear = state.currentDate.getFullYear(); const viewMonth = state.currentDate.getMonth();
      const fragment = document.createDocumentFragment();
      
      scheduleData.forEach(dayData => {
        const card = document.createElement('div');
        let isToday = (viewYear === currentYear && viewMonth === currentMonth && dayData.day === currentDay);
        card.className = isToday ? 'day-card today-highlight open' : 'day-card';

        const groups = {
          group1: { title: '主任 (日) & T2 (日)', html: '', hasMe: false },
          group2: { title: '主任 (夜) & T2 (夜)', html: '', hasMe: false },
          group3: { title: 'T1 (日)', html: '', hasMe: false },
          group4: { title: 'T1 (夜)', html: '', hasMe: false }
        };

        dayData.assignments.forEach((name, i) => {
          const pos = positions[i]; if (!pos) return;
          const shiftClass = pos.type === 'DAY' ? 'day-shift' : 'night-shift';
          const isMe = (name === state.loggedInUserName); // 判斷是否為登入者本人
          
          const assignmentHTML = `
            <div class="assignment ${shiftClass}">
              <div class="position">${pos.label}</div>
              <div class="name">${getDisplayName(name) || '–'}</div>
            </div>`;

          if ((pos.group === 'DIR' || pos.group === 'T2') && pos.type === 'DAY') {
            groups.group1.html += assignmentHTML; if (isMe) groups.group1.hasMe = true;
          } else if ((pos.group === 'DIR' || pos.group === 'T2') && pos.type === 'NIGHT') {
            groups.group2.html += assignmentHTML; if (isMe) groups.group2.hasMe = true;
          } else if (pos.group === 'T1' && pos.type === 'DAY') {
            groups.group3.html += assignmentHTML; if (isMe) groups.group3.hasMe = true;
          } else if (pos.group === 'T1' && pos.type === 'NIGHT') {
            groups.group4.html += assignmentHTML; if (isMe) groups.group4.hasMe = true;
          }
        });

        let detailsHTML = '';
        Object.values(groups).forEach(group => {
          if (group.html) {
            // 若有自己，則加上 current-duty-group 樣式
            const myCrewClass = group.hasMe ? 'current-duty-group' : '';
            detailsHTML += `<div class="assignment-row ${myCrewClass}"><div class="assignment-row-title">${group.title}</div><div class="assignment-grid">${group.html}</div></div>`;
          }
        });

        if (isToday) card.id = "card-today";
        const dayString = String(dayData.day).padStart(2, '0');
        card.innerHTML = `<div class="day-header"><h2>${state.currentDate.getMonth() + 1}/${dayString} 星期${dayData.weekday}</h2></div><div class="day-details">${detailsHTML}</div>`;
        fragment.appendChild(card);
      });

      DOMElements.dailyCardView.innerHTML = ''; DOMElements.dailyCardView.appendChild(fragment);
      DOMElements.dailyCardView.querySelectorAll('.day-header').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('open')));
      attemptScrollToToday();
    }

    function renderFullTable(scheduleData) {
      let tableHTML = `<div class="table-container"><table class="full-roster-table"><thead><tr><th>日期</th>`;
      positions.forEach((pos, i) => { const shiftClass = pos.type === 'DAY' ? 'day-shift' : 'night-shift'; tableHTML += `<th class="${shiftClass}">${pos.label}</th>`; });
      tableHTML += `</tr></thead><tbody>`;
      scheduleData.forEach((dayData, rowIndex) => {
        tableHTML += `<tr><td>${state.currentDate.getMonth() + 1}/${dayData.day} (${dayData.weekday})</td>`;
        dayData.assignments.forEach((name, colIndex) => { let highlightClass = ''; if (state.highlightPerson1 && name === state.highlightPerson1) highlightClass = 'highlight-a'; else if (state.highlightPerson2 && name === state.highlightPerson2) highlightClass = 'highlight-b'; tableHTML += `<td class="${highlightClass}">${getDisplayName(name) || ''}</td>`; }); tableHTML += `</tr>`;
      });
      tableHTML += `</tbody></table></div>`; DOMElements.tableContainer.innerHTML = tableHTML;
    }

    function populatePersonSelector(names, selector, defaultOptionText) {
      const currentSelection = selector.value; selector.innerHTML = `<option value="">${defaultOptionText}</option>`;
      names.forEach(name => { const option = document.createElement('option'); option.value = name; option.textContent = getDisplayName(name); selector.appendChild(option); }); if (names.includes(currentSelection)) selector.value = currentSelection;
    }

    // --- 【新增】2. 月曆渲染與統計資料更新 ---
    function renderPersonalCalendar(scheduleData, personName, containerElement, isInteractive = false, onDayClick = null) {
      if (!containerElement) return;
      const today = new Date(); const currentYear = today.getFullYear(); const currentMonth = today.getMonth(); const currentDay = today.getDate();
      const year = state.currentDate.getFullYear(); const month = state.currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate();

      const personalShifts = {};
      let stats = { day: 0, night: 0 }; 

      if (personName) {
        scheduleData.forEach(dayData => {
          dayData.assignments.forEach((name, i) => {
            if (name === personName) {
              personalShifts[dayData.day] = { position: positions[i].label, type: positions[i].type, fullLabel: positions[i].label.replace(/\n/g, ''), backendValue: shiftList[i] };
              if (positions[i].type === 'DAY') stats.day++; else stats.night++;
            }
          });
        });
      }

      // 將統計數據寫入上方圖標展開區塊
      if (personName === state.loggedInUserName && !isInteractive) {
          const statDayEl = document.getElementById('stat-day'); const statNightEl = document.getElementById('stat-night'); const statOffEl = document.getElementById('stat-off');
          if (statDayEl) statDayEl.innerText = '日 ' + stats.day;
          if (statNightEl) statNightEl.innerText = '夜 ' + stats.night;
          if (statOffEl) statOffEl.innerText = '休 ' + (daysInMonth - stats.day - stats.night);
      }

      let calendarHTML = `<div class="calendar-grid">`;
      const weekdays = ['日', '一', '二', '三', '四', '五', '六']; weekdays.forEach(wd => { calendarHTML += `<div class="calendar-weekday">${wd}</div>`; });
      for (let i = 0; i < firstDay; i++) { calendarHTML += `<div class="calendar-day empty"></div>`; }
      for (let day = 1; day <= daysInMonth; day++) {
        const shift = personalShifts[day]; let shiftClass = 'day-off'; let shiftInfo = '-'; let hasShift = "false"; let shiftDataStr = "";
        if (shift) { shiftClass = shift.type === 'DAY' ? 'day-shift' : 'night-shift'; shiftInfo = shift.position; hasShift = "true"; shiftDataStr = `data-shift-name="${shift.fullLabel}" data-shift-value="${shift.backendValue}" data-shift-type="${shift.type}"`; }
        let todayClass = ''; if (!isInteractive && year === currentYear && month === currentMonth && day === currentDay) { todayClass = ' today'; }
        let noteClass = ''; if (!isInteractive && personName === state.loggedInUserName) { const dateKey = `${year}-${month + 1}-${day}`; if (state.notesData[dateKey]) { noteClass = ' has-note'; } }
        calendarHTML += `<div class="calendar-day ${shiftClass}${todayClass}${noteClass}" data-day="${day}" data-has-shift="${hasShift}" ${shiftDataStr}><div class="day-number">${day}</div><div class="shift-info">${shiftInfo}</div></div>`;
      }
      calendarHTML += `</div>`; containerElement.innerHTML = calendarHTML;

      if (isInteractive && onDayClick) {
        const days = containerElement.querySelectorAll('.calendar-day[data-has-shift="true"]');
        days.forEach(dayEl => {
          dayEl.addEventListener('click', () => {
            containerElement.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected-shift')); dayEl.classList.add('selected-shift');
            const day = dayEl.getAttribute('data-day'); const shiftValue = dayEl.getAttribute('data-shift-value'); onDayClick(day, shiftValue); 
          });
        });
      } else if (!isInteractive && personName === state.loggedInUserName) {
        const days = containerElement.querySelectorAll('.calendar-day:not(.empty)');
        days.forEach(dayEl => { dayEl.style.cursor = 'pointer'; dayEl.addEventListener('click', () => { const day = parseInt(dayEl.getAttribute('data-day')); openNoteModal(year, month, day); }); });
      }
    }

    function switchPage(pageName) { state.currentPage = pageName; DOMElements.pages.forEach(p => p.classList.remove('active')); document.getElementById(pageName).classList.add('active'); DOMElements.sidebarNav.querySelectorAll('a').forEach(a => a.classList.remove('active')); DOMElements.sidebarNav.querySelector(`[data-page="${pageName}"]`).classList.add('active'); DOMElements.viewSelectors.forEach(nav => nav.style.display = 'none'); if (pageName === 'home') { DOMElements.homeViewSelector.style.display = 'flex'; switchView('personalCalendarView', DOMElements.homeViewSelector); } else if (pageName === 'shiftZone') { DOMElements.shiftZoneViewSelector.style.display = 'flex'; switchView('shiftChangeView', DOMElements.shiftZoneViewSelector); } closeSidebar(); }
    function switchView(viewName, viewSelector) { if (!viewSelector) return; const currentPageDiv = document.querySelector('.page.active'); if (!currentPageDiv) return; currentPageDiv.querySelectorAll('.view').forEach(v => v.classList.remove('active')); const targetView = document.getElementById(viewName); if (targetView) { targetView.classList.add('active'); } viewSelector.querySelectorAll('button').forEach(b => b.classList.remove('active')); viewSelector.querySelector(`[data-view="${viewName}"]`).classList.add('active'); if (viewName === 'dailyCardView') { attemptScrollToToday(); } }
    function openSidebar() { DOMElements.sidebar.classList.add('open'); DOMElements.overlay.style.display = 'block'; }
    function closeSidebar() { DOMElements.sidebar.classList.remove('open'); DOMElements.overlay.style.display = 'none'; }
    async function handleSuccessorQuery() {
      const resultsContainer = DOMElements.successorList; resultsContainer.textContent = '查詢中...';
      const year = state.currentDate.getFullYear(); const month = state.currentDate.getMonth() + 1; const fileKey = `${year}-${month}`; const spreadsheetId = SPREADSHEET_IDS[fileKey]; const date = DOMElements.successorDate.value; const role = DOMElements.successorRole.value;
      if (!spreadsheetId) { resultsContainer.textContent = '錯誤：找不到該月份的檔案設定。'; return; }
      try { const requestUrl = `${googleSheetWebAppUrl}?action=getSuccessors&spreadsheetId=${spreadsheetId}&year=${year}&month=${month}&date=${date}&role=${encodeURIComponent(role)}`; const response = await fetch(requestUrl); const data = await response.json(); if (data.error) { throw new Error(data.message); } if (data.successors && data.successors.length > 0) { resultsContainer.textContent = data.successors.join('、'); } else { resultsContainer.textContent = '(無可用人選)'; } } catch (error) { resultsContainer.textContent = '查詢失敗：' + error.message; }
    }

    DOMElements.sidebarNav.addEventListener('click', e => { e.preventDefault(); if (e.target.tagName === 'A') { switchPage(e.target.dataset.page); } });
    DOMElements.header.addEventListener('click', (e) => { if (e.target.closest('#sidebar-toggle')) { DOMElements.sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); } });
    DOMElements.overlay.addEventListener('click', closeSidebar);
    DOMElements.logoutBtn.addEventListener('click', () => { DOMElements.logoutConfirm.style.display = 'block'; DOMElements.overlay.style.display = 'block'; });
    DOMElements.confirmLogoutNo.addEventListener('click', () => { DOMElements.logoutConfirm.style.display = 'none'; if (!DOMElements.sidebar.classList.contains('open')) DOMElements.overlay.style.display = 'none'; });
    DOMElements.confirmLogoutYes.addEventListener('click', () => { auth.signOut(); DOMElements.logoutConfirm.style.display = 'none'; DOMElements.overlay.style.display = 'none'; });
    DOMElements.homeViewSelector.addEventListener('click', e => { if (e.target.tagName === 'BUTTON') switchView(e.target.dataset.view, DOMElements.homeViewSelector); });
    DOMElements.shiftZoneViewSelector.addEventListener('click', e => { if (e.target.tagName === 'BUTTON') switchView(e.target.dataset.view, DOMElements.shiftZoneViewSelector); });
    DOMElements.prevMonthBtn.addEventListener('click', () => { state.currentDate.setMonth(state.currentDate.getMonth() - 1); fetchData(); });
    DOMElements.nextMonthBtn.addEventListener('click', () => { state.currentDate.setMonth(state.currentDate.getMonth() + 1); fetchData(); });
    DOMElements.personSelector.addEventListener('change', e => { state.selectedPerson = e.target.value; const fileKey = `${state.currentDate.getFullYear()}-${state.currentDate.getMonth() + 1}`; if (state.cachedData[fileKey]) { renderPersonalCalendar(state.cachedData[fileKey].schedule, state.selectedPerson, DOMElements.colleagueCalendarContainer); } });
    DOMElements.highlighter1.addEventListener('change', e => { state.highlightPerson1 = e.target.value; const fileKey = `${state.currentDate.getFullYear()}-${state.currentDate.getMonth() + 1}`; if (state.cachedData[fileKey]) renderFullTable(state.cachedData[fileKey].schedule); });
    DOMElements.highlighter2.addEventListener('change', e => { state.highlightPerson2 = e.target.value; const fileKey = `${state.currentDate.getFullYear()}-${state.currentDate.getMonth() + 1}`; if (state.cachedData[fileKey]) renderFullTable(state.cachedData[fileKey].schedule); });
    
    DOMElements.shiftChangeForm.querySelector('#originalPerson').addEventListener('change', e => { const person = e.target.value; const year = state.currentDate.getFullYear(); const month = state.currentDate.getMonth() + 1; const fileKey = `${year}-${month}`; DOMElements.originalDateInput.value = ""; DOMElements.originalShiftInput.value = ""; if(state.cachedData[fileKey]) { renderPersonalCalendar(state.cachedData[fileKey].schedule, person, DOMElements.sourceCalendarContainer, true, (day, shiftName) => { DOMElements.originalDateInput.value = day; DOMElements.originalShiftInput.value = shiftName; }); } });
    DOMElements.changeType.addEventListener('change', e => { const isSwap = e.target.value === '調'; DOMElements.targetCalendarWrapper.style.display = isSwap ? 'block' : 'none'; if (!isSwap) { DOMElements.swappedDateInput.value = ""; DOMElements.swappedShiftInput.value = ""; DOMElements.targetCalendarContainer.querySelectorAll('.selected-shift').forEach(el => el.classList.remove('selected-shift')); } });
    DOMElements.shiftChangeForm.querySelector('#newPerson').addEventListener('change', e => { const person = e.target.value; const year = state.currentDate.getFullYear(); const month = state.currentDate.getMonth() + 1; const fileKey = `${year}-${month}`; DOMElements.swappedDateInput.value = ""; DOMElements.swappedShiftInput.value = ""; if(state.cachedData[fileKey]) { renderPersonalCalendar(state.cachedData[fileKey].schedule, person, DOMElements.targetCalendarContainer, true, (day, shiftName) => { DOMElements.swappedDateInput.value = day; DOMElements.swappedShiftInput.value = shiftName; }); } });
    DOMElements.preSubmitBtn.addEventListener('click', () => { const form = DOMElements.shiftChangeForm; const type = form.changeType.value; const p1 = form.originalPerson.value; const d1 = DOMElements.originalDateInput.value; const s1 = DOMElements.originalShiftInput.value; const p2 = form.newPerson.value; if (!p1 || !d1 || !s1) { alert("請選擇申請人，並點選行事曆上的班別！"); return; } if (!p2) { alert("請選擇對象人員！"); return; } let confirmMsg = ""; const month = state.currentDate.getMonth() + 1; const p1Name = getDisplayName(p1); const p2Name = getDisplayName(p2); if (type === '調') { const d2 = DOMElements.swappedDateInput.value; const s2 = DOMElements.swappedShiftInput.value; if (!d2 || !s2) { alert("調班模式下，請點選對象行事曆上欲交換的班別！"); return; } confirmMsg = `<div style="text-align:left; display:inline-block;"><span style="color:#7D8C91;">${p1Name}</span> ${month}/${d1} ${s1}<br><div style="text-align:center; color:#CC9B86; margin: 5px 0;">⇅ 互調</div><span style="color:#7D8C91;">${p2Name}</span> ${month}/${d2} ${s2}</div>`; } else { confirmMsg = `<div style="text-align:left; display:inline-block;"><span style="color:#7D8C91;">${p1Name}</span> ${month}/${d1} ${s1}<br><div style="text-align:center; color:#CC9B86; margin: 5px 0;">➔ 給班</div><span style="color:#7D8C91;">${p2Name}</span></div>`; } DOMElements.modalContent.innerHTML = confirmMsg; DOMElements.confirmModal.style.display = 'flex'; });
    DOMElements.modalCancel.addEventListener('click', () => { DOMElements.confirmModal.style.display = 'none'; });
    DOMElements.modalConfirm.addEventListener('click', () => { DOMElements.confirmModal.style.display = 'none'; handleFormSubmit({ target: DOMElements.shiftChangeForm, preventDefault: () => {} }); });
    DOMElements.changePasswordForm.addEventListener('submit', handleChangePassword);
    if (DOMElements.successorQueryBtn) { DOMElements.successorQueryBtn.addEventListener('click', handleSuccessorQuery); }
    DOMElements.btnCancelNote.addEventListener('click', () => { DOMElements.noteModal.style.display = 'none'; });
    DOMElements.btnSaveNote.addEventListener('click', saveNote);
    DOMElements.btnDeleteNote.addEventListener('click', () => { if(confirm('確定要刪除此備註嗎？')) deleteNote(); });

    switchPage('home'); subscribeToNotes(); fetchData();
  }
</script>
