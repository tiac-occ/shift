        supervisor: ['政偉', '政昆', '偉揚', '彥平', '建昌', '保吉', '志祥', '仲喬', '懋荃', '子翔', '家鋐', '佳玲', '映蓉', '敬舜', '祈雯', '佑丞', '宥柔', '品妍', '伊筠', '貞瑜', '映笛', '家琪', '昕珆', '詳崴', '宗勳', '凱程', '微儀', '如蘭'],
        sysops:     ['俊揚', '泉延', '曜華', '品蓉', '嘉珣', '晴涵', '瑀芯', '心慈', '欣伶', '李昇']
      };

      state.listings = [];
      state.selectedBoardDay = null;
      state.publishSelectedDay = null;
      state.publishSelectedShift = null;
      state.boardFilter = 'all';
      state.publishMode = 'give_swap';

      let unsubscribeListings = null;
      function subscribeToListings() {
        if (unsubscribeListings) unsubscribeListings();
        const year = state.currentDate.getFullYear();
        const month = state.currentDate.getMonth() + 1;
        const fileKey = `${year}-${month}`;
        
        const today = new Date();
        const isCurrentMonth = (today.getFullYear() === year && (today.getMonth() + 1) === month);
        const todayDateNum = today.getDate();
        
        // 立即渲染月曆主體，避免因資料庫權限/延遲導致畫面空白
        if (!state.listings) state.listings = [];
        renderBoardCalendar();
        
        unsubscribeListings = db.collection('shift_listings')
          .where('fileKey', '==', fileKey)
          .where('status', '==', 'active')
          .onSnapshot(snapshot => {
            const listings = [];
            const expiredBatch = db.batch();
            let hasExpired = false;
            
            snapshot.forEach(doc => {
              const data = doc.data();
              const isPastMonth = (year < today.getFullYear() || (year === today.getFullYear() && month < (today.getMonth() + 1)));
              if (isPastMonth || (isCurrentMonth && Number(data.offerDate) < todayDateNum)) {
                expiredBatch.update(db.collection('shift_listings').doc(doc.id), { status: 'expired' });
                hasExpired = true;
              } else {
                listings.push({ id: doc.id, ...data });
              }
            });
            
            if (hasExpired) {
              expiredBatch.commit().catch(err => console.error("自動標記過期刊登失敗:", err));
            }
            
            state.listings = listings;
            renderBoardCalendar();
            if (state.selectedBoardDay) {
              renderListingCards(state.selectedBoardDay);
            }
          }, error => {
            console.error("監聽媒合資料失敗:", error);
          });
      }

      function getFilteredListings(listings) {
        if (state.boardFilter === 'all') return listings;
        if (state.boardFilter === 'give') return listings.filter(l => l.listingType !== 'take' && l.canGive);
        if (state.boardFilter === 'swap') return listings.filter(l => l.listingType !== 'take' && l.canSwap);
        if (state.boardFilter === 'take') return listings.filter(l => l.listingType === 'take');
        return listings;
      }

      function renderBoardCalendar() {
        const container = DOMElements.boardCalendarContainer;
        container.innerHTML = '';
        
        const year = state.currentDate.getFullYear();
        const month = state.currentDate.getMonth();
        
        const firstDayIndex = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const calendarGrid = document.createElement('div');
        calendarGrid.className = 'calendar-grid';
        
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        weekdays.forEach(wd => {
          const header = document.createElement('div');
          header.className = 'calendar-header-day';
          header.textContent = wd;
          calendarGrid.appendChild(header);
        });
        
        const startOffset = firstDayIndex === 0 ? 0 : firstDayIndex;
        for (let i = startOffset - 1; i >= 0; i--) {
          const dayCell = document.createElement('div');
          dayCell.className = 'calendar-day empty';
          calendarGrid.appendChild(dayCell);
        }
        
        const today = new Date();
        const isCurrentMonth = (today.getFullYear() === year && today.getMonth() === month);
        
        for (let d = 1; d <= daysInMonth; d++) {
          const dayCell = document.createElement('div');
          dayCell.className = 'calendar-day';
          dayCell.setAttribute('data-day', d);
          
          const dayNum = document.createElement('div');
          dayNum.className = 'day-number';
          dayNum.textContent = d;
          dayCell.appendChild(dayNum);
          
          // 篩選後的刊登
          const allForDay = (state.listings || []).filter(l => Number(l.offerDate) === Number(d));
          const filteredForDay = getFilteredListings(allForDay);
          
          if (filteredForDay.length > 0) {
            dayCell.style.cursor = 'pointer';
            dayCell.addEventListener('click', () => {
              container.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('today-highlight'));
              dayCell.classList.add('today-highlight');
              state.selectedBoardDay = d;
              renderListingCards(d);
            });
            
            const badgesWrapper = document.createElement('div');
            badgesWrapper.className = 'board-cell-badges-wrapper';
            
            // Option B: 統一顯示該日筆數，顏色搭配篩選按鈕
            const badge = document.createElement('span');
            badge.className = 'board-badge';
            if (state.boardFilter === 'give') badge.classList.add('give-badge');
            else if (state.boardFilter === 'swap') badge.classList.add('swap-badge');
            else if (state.boardFilter === 'take') badge.classList.add('take-badge');
            else badge.classList.add('neutral-badge');
            badge.textContent = `${filteredForDay.length}筆`;
            badgesWrapper.appendChild(badge);
            
            dayCell.appendChild(badgesWrapper);
          } else {
            const badgesWrapper = document.createElement('div');
            badgesWrapper.className = 'board-cell-badges-wrapper';
            const emptyLabel = document.createElement('span');
            emptyLabel.style.color = '#ccc';
            emptyLabel.style.fontSize = '1.2em';
            emptyLabel.style.fontWeight = 'bold';
            emptyLabel.style.display = 'flex';
            emptyLabel.style.alignItems = 'center';
            emptyLabel.style.justifyContent = 'center';
            emptyLabel.style.flex = '1';
            emptyLabel.textContent = '-';
            badgesWrapper.appendChild(emptyLabel);
            dayCell.appendChild(badgesWrapper);
          }
          
          if (state.selectedBoardDay === d) {
            dayCell.classList.add('today-highlight');
          }
          calendarGrid.appendChild(dayCell);
        }
        
        container.appendChild(calendarGrid);
      }

      function renderListingCards(day) {
        const section = DOMElements.listingsSection;
        const title = DOMElements.listingsSectionTitle;
        const container = DOMElements.listingsCardsContainer;
        
        container.innerHTML = '';
        
        const allDayListings = (state.listings || []).filter(l => Number(l.offerDate) === Number(day));
        const dayListings = getFilteredListings(allDayListings);
        if (dayListings.length === 0) {
          section.style.display = 'none';
          return;
        }
        
        const month = state.currentDate.getMonth() + 1;
        const filterLabels = { all: '全部', give: '讓班', swap: '調班', take: '接班' };
        const filterLabel = state.boardFilter !== 'all' ? ` • ${filterLabels[state.boardFilter]}` : '';
        title.innerHTML = `
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 6px; color: var(--starlux-gold);"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <span style="vertical-align: middle;">${month}月${day}日 的刊登需求 (${dayListings.length})${filterLabel}</span>
        `;
        section.style.display = 'flex';
        
        const fileKey = `${state.currentDate.getFullYear()}-${month}`;
        const currentMonthData = state.cachedData[fileKey];
        const userShifts = currentMonthData ? currentMonthData.schedule : [];
        
        const mappedListings = dayListings.map(listing => {
          const statusInfo = computeMatchStatus(listing, userShifts);
          return { listing, ...statusInfo };
        });
        
        mappedListings.sort((a, b) => {
          const score = { 'perfect-match': 3, 'eligible': 2, 'ineligible': 1 };
          const aScore = a.listing.publisherName === state.loggedInUserName ? 0 : score[a.status];
          const bScore = b.listing.publisherName === state.loggedInUserName ? 0 : score[b.status];
          return bScore - aScore;
        });
        
        mappedListings.forEach(({ listing, status, reason }) => {
          const card = document.createElement('div');
          const isMine = (listing.publisherName === state.loggedInUserName);
          const isTake = (listing.listingType === 'take');
          
          card.className = `listing-card ${isMine ? 'eligible' : status}`;
          
          const roleLabelMap = { director: '主任', deputy: '副主任', supervisor: '督導', sysops: '設備航資' };
          
          if (isTake) {
            // === 接班類型卡片 ===
            const takeTypesText = (listing.takeShiftTypes || []).map(t => t === 'DAY' ? '日班' : '夜班').join(' / ');
            const rolesText = (listing.acceptableRoles || []).map(r => roleLabelMap[r] || r).join('、') || '無限制';
            
            let actionButtonHtml = '';
            if (isMine) {
              actionButtonHtml = `<button class="card-action-btn cancel-listing" onclick="handleCancelListing('${listing.id}')">手動下架</button>`;
            } else {
              const disabledAttr = (status === 'ineligible') ? 'disabled' : '';
              const buttonText = (status === 'ineligible') ? `不符資格 (${reason})` : '我有班可讓 (送出通知)';
              actionButtonHtml = `<button class="card-action-btn take" ${disabledAttr} onclick="handleTakeInterestClick('${listing.id}', '${listing.publisherName}', '${listing.offerDate}')">${buttonText}</button>`;
            }
            
            card.innerHTML = `
              <div class="perfect-match-indicator">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:4px;">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                完美命中 (您有符合的班可以讓)
              </div>
              <div class="card-header">
                <span class="card-title">${getDisplayName(listing.publisherName)}</span>
                <span class="card-badge take">接班</span>
              </div>
              <div class="card-body">
                <div class="card-row">
                  <span class="card-label">想接班日</span>
                  <span class="card-value" style="font-weight:bold; color:#2E7D32;">${month}/${listing.offerDate}</span>
                </div>
                <div class="card-row">
                  <span class="card-label">班別偏好</span>
                  <span class="card-value">${takeTypesText}</span>
                </div>
                <div class="card-row">
                  <span class="card-label">可擔任</span>
                  <span class="card-value">${rolesText}</span>
                </div>
              </div>
              <div class="card-actions" style="margin-top:10px;">
                ${actionButtonHtml}
              </div>
            `;
          } else {
            // === 讓班/調班類型卡片 (原有邏輯) ===
            let prefHtml = '';
            if (listing.canSwap && listing.swapPreferences && listing.swapPreferences.length > 0) {
              prefHtml = listing.swapPreferences.map(p => {
                const typesText = p.types.map(t => t === 'DAY' ? '日' : '夜').join('/');
                return `<div class="swap-row-item-display" style="margin-left:12px; color:#555;">• ${month}/${p.date} (${typesText}班)</div>`;
              }).join('');
            } else {
              prefHtml = '<span style="color:#888; font-size:0.9em; margin-left:12px;">(無特別指定日期)</span>';
            }
            
            const acceptableRolesText = (listing.acceptableRoles || []).map(r => roleLabelMap[r] || r).join('、') || '無特別限制';
            
            let actionButtonHtml = '';
            if (isMine) {
              actionButtonHtml = `<button class="card-action-btn cancel-listing" onclick="handleCancelListing('${listing.id}')">手動下架</button>`;
            } else {
              const disabledAttr = (status === 'ineligible') ? 'disabled' : '';
              const buttonText = (status === 'ineligible') ? `不符資格 (${reason})` : '有意接班 (送出通知)';
              actionButtonHtml = `<button class="card-action-btn take" ${disabledAttr} onclick="handleInterestClick('${listing.id}', '${listing.publisherName}', '${listing.offerDate}', '${listing.offerShiftLabel}')">${buttonText}</button>`;
            }
            
            const typeBadge = listing.canGive && listing.canSwap ? '讓出 / 調班' : (listing.canGive ? '讓出' : '調班');
            const badgeClass = listing.canGive ? 'give' : 'swap';
            
            card.innerHTML = `
              <div class="perfect-match-indicator">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:4px;">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                完美命中 (時間互補且職位合格)
              </div>
              <div class="card-header">
                <span class="card-title">${getDisplayName(listing.publisherName)}</span>
                <span class="card-badge ${badgeClass}">${typeBadge}</span>
              </div>
              <div class="card-body">
                <div class="card-row">
                  <span class="card-label">刊登班務</span>
                  <span class="card-value" style="font-weight:bold; color:var(--starlux-header);">${month}/${listing.offerDate} ${listing.offerShiftLabel}</span>
                </div>
                ${listing.canSwap ? `
                <div class="card-row" style="flex-direction:column; gap:4px;">
                  <span class="card-label">希望能換</span>
                  <div style="display:flex; flex-direction:column; width:100%;">${prefHtml}</div>
                </div>
                <div class="card-row">
                  <span class="card-label">接受身分</span>
                  <span class="card-value">${acceptableRolesText}</span>
                </div>
                ` : ''}
              </div>
              <div class="card-actions" style="margin-top:10px;">
                ${actionButtonHtml}
              </div>
            `;
          }
          container.appendChild(card);
        });
      }

      window.handleCancelListing = async function(id) {
        if (confirm("確定要下架此媒合刊登嗎？")) {
          try {
            await db.collection('shift_listings').doc(id).update({ status: 'expired' });
            alert("已成功下架！");
          } catch (err) {
            console.error("下架失敗:", err);
            alert("下架失敗，請聯絡系統管理員：" + err.message);
          }
        }
      };

      window.handleInterestClick = async function(id, publisherName, date, shiftLabel) {
        const publisherFullName = getDisplayName(publisherName);
        const month = state.currentDate.getMonth() + 1;
        
        if (confirm(`確認發送「有意接班」通知給 ${publisherFullName} 嗎？`)) {
          try {
            await db.collection('notifications').add({
              targetName: publisherFullName,
              type: 'match_interest',
              role: 'match_receiver',
              otherPersonName: state.loggedInUserName,
              date1: `${month}/${date}`,
              shift1: shiftLabel,
              timestamp: firebase.firestore.FieldValue.serverTimestamp(),
              read: false
            });
            alert("已成功通知刊登者！對方會在系統右上角的鈴鐺收到您的接班意願通知。");
          } catch (err) {
            console.error("送出通知失敗:", err);
            alert("送出通知失敗，請連線重試：" + err.message);
          }
        }
      };

      // 接班刊登的通知：「我有班可讓」
      window.handleTakeInterestClick = async function(id, publisherName, date) {
        const publisherFullName = getDisplayName(publisherName);
        const month = state.currentDate.getMonth() + 1;
        const fileKey = `${state.currentDate.getFullYear()}-${month}`;
        const currentMonthData = state.cachedData[fileKey];
        const userShifts = currentMonthData ? currentMonthData.schedule : [];
        const myShift = getUserShiftOnDay(userShifts, Number(date));
        const myShiftLabel = myShift || '未知班別';
        
        if (confirm(`確認通知 ${publisherFullName}：您在 ${month}/${date} 有 ${myShiftLabel} 可以讓給對方？`)) {
          try {
            await db.collection('notifications').add({
              targetName: publisherFullName,
              type: 'match_take_interest',
              role: 'match_take_receiver',
              otherPersonName: state.loggedInUserName,
              date1: `${month}/${date}`,
              shift1: myShiftLabel,
              timestamp: firebase.firestore.FieldValue.serverTimestamp(),
              read: false
            });
            alert("已成功通知接班刊登者！對方會在鈴鐺收到您「有班可讓」的通知。");
          } catch (err) {
            console.error("送出通知失敗:", err);
            alert("送出通知失敗，請連線重試：" + err.message);
          }
        }
      };

      function getShiftRoleCategory(shiftName) {
        if (!shiftName) return null;
        const clean = shiftName.replace(/^[日夜]_/, '');
        if (clean.includes('主任') && !clean.includes('副')) return 'director';
        if (clean.includes('副主任')) return 'deputy';
        if (clean.includes('設備') || clean.includes('航資')) return 'sysops';
        return 'supervisor'; // 作業, 航廈, 通聯, 營運 etc.
      }

      function computeMatchStatus(listing, userShifts) {
        const myName = state.loggedInUserName;
        const offerDay = listing.offerDate;
        
        if (listing.publisherName === myName) {
          return { status: 'eligible', reason: '' };
        }
        
        // === 接班類型的匹配邏輯 ===
        if (listing.listingType === 'take') {
          // 檢查我當天是否有班可以讓
          const myShift = getUserShiftOnDay(userShifts, offerDay);
          if (!myShift || myShift === '休' || myShift.includes('OJT')) {
            return { status: 'ineligible', reason: '當天無班可讓' };
          }
          
          // 檢查接班者是否有資格揔任我的班別
          const myShiftRole = getShiftRoleCategory(myShift);
          if (myShiftRole) {
            const posterName = listing.publisherName;
            const qualList = ROLE_QUALIFICATION[myShiftRole] || [];
            const posterFullName = getDisplayName(posterName);
            const isQualified = qualList.some(name => name === posterName || getDisplayName(name) === posterFullName);
            if (!isQualified) {
              return { status: 'ineligible', reason: '接班者職位不符' };
            }
          }
          
          // 檢查班別類型是否符合接班者偏好
          const myShiftType = myShift.startsWith('日') ? 'DAY' : 'NIGHT';
          const takeTypes = listing.takeShiftTypes || ['DAY', 'NIGHT'];
          
          if (takeTypes.includes(myShiftType)) {
            return { status: 'perfect-match', reason: '' };
          }
          
          return { status: 'eligible', reason: '' };
        }
        
        // === 讓班/調班類型的原有匹配邏輯 ===
        let isQualified = false;
        
        if (!listing.acceptableRoles || listing.acceptableRoles.length === 0) {
          isQualified = true;
        } else {
          const myFullName = getDisplayName(myName);
          const checkRole = (roleList) => roleList.some(name => name === myName || getDisplayName(name) === myFullName);
          
          listing.acceptableRoles.forEach(roleKey => {
            if (roleKey === 'director' && checkRole(ROLE_QUALIFICATION.director)) isQualified = true;
            if (roleKey === 'deputy' && checkRole(ROLE_QUALIFICATION.deputy)) isQualified = true;
            if (roleKey === 'supervisor' && checkRole(ROLE_QUALIFICATION.supervisor)) isQualified = true;
            if (roleKey === 'sysops' && (checkRole(ROLE_QUALIFICATION.sysops) || checkRole(ROLE_QUALIFICATION.supervisor))) isQualified = true;
          });
        }
        
        if (!isQualified) {
          return { status: 'ineligible', reason: '職位資格不符' };
        }
        
        const myOfferDayShift = getUserShiftOnDay(userShifts, offerDay);
        if (myOfferDayShift && myOfferDayShift !== '休' && !myOfferDayShift.includes('OJT')) {
          return { status: 'ineligible', reason: '當天已有值班' };
        }
        
        const isOfferDayShift = listing.offerShift.startsWith('日');
        if (isOfferDayShift) {
          const prevDayShift = getUserShiftOnDay(userShifts, offerDay - 1);
          if (prevDayShift && prevDayShift.startsWith('夜')) {
            return { status: 'ineligible', reason: '前夜班衝突' };
          }
        } else {
          const nextDayShift = getUserShiftOnDay(userShifts, offerDay + 1);
          if (nextDayShift && nextDayShift.startsWith('日')) {
            return { status: 'ineligible', reason: '後日班衝突' };
          }
        }
        
        if (listing.canSwap && listing.swapPreferences && listing.swapPreferences.length > 0) {
          let matchesSwapPref = false;
          listing.swapPreferences.forEach(pref => {
            const myShiftOnPrefDay = getUserShiftOnDay(userShifts, pref.date);
            if (myShiftOnPrefDay && myShiftOnPrefDay !== '休' && !myShiftOnPrefDay.includes('OJT')) {
              const myShiftType = myShiftOnPrefDay.startsWith('日') ? 'DAY' : 'NIGHT';
              if (pref.types.includes(myShiftType)) {
                matchesSwapPref = true;
              }
            }
          });
          
          if (matchesSwapPref) {
            return { status: 'perfect-match', reason: '' };
          }
        }
        
        return { status: 'eligible', reason: '' };
      }

      function getUserShiftOnDay(userShifts, dayNum) {
        const dayData = userShifts.find(s => s.day === dayNum);
        if (!dayData) return '';
        
        const year = state.currentDate.getFullYear();
        const month = state.currentDate.getMonth() + 1;
        const conf = getShiftConfig(year, month);
        
        let myAssignment = '';
        const myFullName = getDisplayName(state.loggedInUserName);
        
        conf.positions.forEach((pos, idx) => {
          const assignedName = dayData.assignments[idx] || '';
          if (assignedName === state.loggedInUserName || getDisplayName(assignedName) === myFullName) {
            const prefix = pos.type === 'DAY' ? '日' : '夜';
            myAssignment = `${prefix}_${pos.label}`;
          }
        });
        
        if (!myAssignment && dayData.hasOJT && dayData.traineeName && (dayData.traineeName === state.loggedInUserName || getDisplayName(dayData.traineeName) === myFullName)) {
          myAssignment = 'OJT';
        }
        
        return myAssignment;
      }

      function renderMatchZone() {
        const activeView = DOMElements.publishView.classList.contains('active') ? 'publishView' : 'boardView';
        const year = state.currentDate.getFullYear();
        const month = state.currentDate.getMonth() + 1;
        const fileKey = `${year}-${month}`;
        
        if (activeView === 'boardView') {
          subscribeToListings();
        } else {
          state.publishSelectedDay = null;
          state.publishSelectedShift = null;
          DOMElements.selectedPublishShiftWrapper.style.display = 'none';
          DOMElements.selectedTakeDayWrapper.style.display = 'none';
          DOMElements.publishMessageContainer.innerHTML = '';
          
          // 根據發布模式顯示不同表單
          if (state.publishMode === 'take') {
            DOMElements.publishForm.style.display = 'none';
            DOMElements.takePublishForm.style.display = 'grid';
            renderTakePublishCalendar();
          } else {
            DOMElements.publishForm.style.display = 'grid';
            DOMElements.takePublishForm.style.display = 'none';
            if (state.cachedData[fileKey]) {
              renderPersonalCalendar(state.cachedData[fileKey].schedule, state.loggedInUserName, DOMElements.publishCalendarContainer, true, (day, shiftName) => {
                state.publishSelectedDay = day;
                state.publishSelectedShift = shiftName;
                DOMElements.selectedPublishShiftWrapper.style.display = 'block';
                DOMElements.selectedPublishShiftText.textContent = `${month}/${day} ${shiftName}`;
              });
            } else {
              DOMElements.publishCalendarContainer.innerHTML = '<div style="padding:15px; color:#888;">(尚無此月份班表資料，請先回首頁讀取)</div>';
            }
          }
        }
      }

      // 接班模式專用日曆：休息日可點選、有班日不可點
      function renderTakePublishCalendar() {
        const container = DOMElements.takeCalendarContainer;
        container.innerHTML = '';
        
        const year = state.currentDate.getFullYear();
        const month = state.currentDate.getMonth() + 1;
        const fileKey = `${year}-${month}`;
        const data = state.cachedData[fileKey];
        
        if (!data) {
          container.innerHTML = '<div style="padding:15px; color:#888;">(尚無此月份班表資料，請先回首頁讀取)</div>';
          return;
        }
        
        const schedule = data.schedule;
        const conf = getShiftConfig(year, month);
        const myFullName = getDisplayName(state.loggedInUserName);
        
        // 建立每日班務 map
        const myShifts = {};
        schedule.forEach(dayData => {
          let myAssignment = '';
          let shiftType = '';
          conf.positions.forEach((pos, idx) => {
            const assignedName = dayData.assignments[idx] || '';
            if (assignedName === state.loggedInUserName || getDisplayName(assignedName) === myFullName) {
              const prefix = pos.type === 'DAY' ? '日' : '夜';
              myAssignment = `${prefix}_${pos.label.replace(/\\n/g, '')}`;
              shiftType = pos.type;
            }
          });
          myShifts[dayData.day] = { shift: myAssignment, type: shiftType };
        });
        
        // 建立日曆
        let calendarHTML = `<div class="calendar-grid">`;
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        weekdays.forEach(wd => { calendarHTML += `<div class="calendar-weekday">${wd}</div>`; });
        
        const monthIdx = month - 1;
        const firstDay = new Date(year, monthIdx, 1).getDay();
        const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();
        for (let i = 0; i < firstDay; i++) { calendarHTML += `<div class="calendar-day empty"></div>`; }
        
        const today = new Date();
        const isCurrentMonth = (today.getFullYear() === year && (today.getMonth() + 1) === month);
        const todayDate = today.getDate();
        
        for (let d = 1; d <= daysInMonth; d++) {
          const info = myShifts[d] || { shift: '', type: '' };
          const hasShift = info.shift && !info.shift.includes('OJT');
          const isPast = isCurrentMonth && d < todayDate;
          
          if (hasShift || isPast) {
            // 有班或已過：不可點
            let shiftClass = 'day-off';
            let shiftText = '-';
            if (hasShift) {
              shiftClass = info.type === 'DAY' ? 'day-shift' : 'night-shift';
              shiftText = info.shift.replace(/^[日夜]_/, '');
            }
            calendarHTML += `<div class="calendar-day ${shiftClass} has-shift-no-select" data-day="${d}"><div class="day-number">${d}</div><div class="shift-info">${shiftText}</div></div>`;
          } else {
            // 休息日：可點選
            const selectedClass = (state.publishSelectedDay == d && state.publishMode === 'take') ? ' selected-publish-day' : '';
            calendarHTML += `<div class="calendar-day day-off rest-day-selectable${selectedClass}" data-day="${d}" data-selectable="true"><div class="day-number">${d}</div><div class="shift-info" style="color:#43A047; font-weight:bold;">可選</div></div>`;
          }
        }
        calendarHTML += `</div>`;
        container.innerHTML = calendarHTML;
        
        // 綁定點擊事件
        container.querySelectorAll('.calendar-day[data-selectable="true"]').forEach(dayEl => {
          dayEl.addEventListener('click', () => {
            container.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected-publish-day'));
            dayEl.classList.add('selected-publish-day');
            const d = parseInt(dayEl.getAttribute('data-day'));
            state.publishSelectedDay = d;
            state.publishSelectedShift = null;
            DOMElements.selectedTakeDayWrapper.style.display = 'block';
            DOMElements.selectedTakeDayText.textContent = `${month}/${d}`;
            
            // === 自動檢查前後班務衝突，鎖定不可選的班別 ===
            const prevInfo = myShifts[d - 1] || { shift: '', type: '' };
            const nextInfo = myShifts[d + 1] || { shift: '', type: '' };
            const prevIsNight = prevInfo.shift && prevInfo.shift.startsWith('夜');
            const nextIsDay = nextInfo.shift && nextInfo.shift.startsWith('日');
            
            const dayCheckbox = DOMElements.takeWantDay;
            const nightCheckbox = DOMElements.takeWantNight;
            const dayLabel = document.getElementById('takeWantDayLabel');
            const nightLabel = document.getElementById('takeWantNightLabel');
            const conflictNote = document.getElementById('takeShiftConflictNote');
            
            // 重置狀態
            dayCheckbox.disabled = false;
            nightCheckbox.disabled = false;
            dayLabel.style.opacity = '1';
            nightLabel.style.opacity = '1';
            dayLabel.style.cursor = 'pointer';
            nightLabel.style.cursor = 'pointer';
            conflictNote.style.display = 'none';
            conflictNote.innerHTML = '';
            
            let conflicts = [];
            
            if (prevIsNight) {
              dayCheckbox.checked = false;
              dayCheckbox.disabled = true;
              dayLabel.style.opacity = '0.4';
              dayLabel.style.cursor = 'not-allowed';
              conflicts.push(`${month}/${d-1} 為夜班 → 不可接日班`);
            }
            
            if (nextIsDay) {
              nightCheckbox.checked = false;
              nightCheckbox.disabled = true;
              nightLabel.style.opacity = '0.4';
              nightLabel.style.cursor = 'not-allowed';
              conflicts.push(`${month}/${d+1} 為日班 → 不可接夜班`);
            }
            
            if (conflicts.length > 0) {
              conflictNote.innerHTML = `⚠️ 班務衝突：${conflicts.join('；')}`;
              conflictNote.style.display = 'block';
            }
            
            // 如果兩個都被鎖，自動帶出提示
            if (prevIsNight && nextIsDay) {
              conflictNote.innerHTML += `<br>ℹ️ 此日前後班務衝突，無法接任任何班別。`;
            } else if (!prevIsNight && !nextIsDay) {
              // 沒衝突，預設勾日班
              dayCheckbox.checked = true;
            } else if (prevIsNight) {
              // 只能接夜班
              nightCheckbox.checked = true;
            } else if (nextIsDay) {
              // 只能接日班
              dayCheckbox.checked = true;
            }
          });
        });
      }

      function addSwapRow() {
        const container = DOMElements.swapRowsContainer;
        const row = document.createElement('div');
        row.className = 'swap-row-item';
        
        const year = state.currentDate.getFullYear();
        const month = state.currentDate.getMonth() + 1;
        const daysInMonth = new Date(year, month, 0).getDate();
        
        let dateOptions = '';
        for (let d = 1; d <= daysInMonth; d++) {
          dateOptions += `<option value="${d}">${month}/${d}</option>`;
        }
        
        row.innerHTML = `
          <select class="swapDateSelect" style="max-width:120px;">
            ${dateOptions}
          </select>
          <label class="checkbox-label"><input type="checkbox" class="swapDayType" value="DAY" checked> 日班</label>
          <label class="checkbox-label"><input type="checkbox" class="swapNightType" value="NIGHT"> 夜班</label>
          <button type="button" class="remove-swap-btn">&times;</button>
        `;
        
        row.querySelector('.remove-swap-btn').addEventListener('click', () => {
          row.remove();
        });
        
        container.appendChild(row);
      }

      DOMElements.pubCanSwap.addEventListener('change', e => {
        DOMElements.swapPreferencesWrapper.style.display = e.target.checked ? 'block' : 'none';
        if (e.target.checked && DOMElements.swapRowsContainer.children.length === 0) {
          addSwapRow();
        }
      });

      DOMElements.addSwapRowBtn.addEventListener('click', addSwapRow);

      DOMElements.matchZoneViewSelector.addEventListener('click', e => {
        if (e.target.tagName === 'BUTTON') {
          switchView(e.target.dataset.view, DOMElements.matchZoneViewSelector);
          renderMatchZone();
        }
      });

      // 佈告欄篩選列事件
      DOMElements.boardFilterBar.addEventListener('click', e => {
        const btn = e.target.closest('.board-filter-btn');
        if (!btn) return;
        DOMElements.boardFilterBar.querySelectorAll('.board-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.boardFilter = btn.dataset.filter;
        renderBoardCalendar();
        if (state.selectedBoardDay) {
          renderListingCards(state.selectedBoardDay);
        }
      });

      // 發布模式切換器事件
      DOMElements.publishModeSwitcher.addEventListener('click', e => {
        const btn = e.target.closest('.publish-mode-btn');
        if (!btn) return;
        const mode = btn.dataset.publishMode;
        if (mode === state.publishMode) return;
        
        state.publishMode = mode;
        state.publishSelectedDay = null;
        state.publishSelectedShift = null;
        
        DOMElements.publishModeSwitcher.querySelectorAll('.publish-mode-btn').forEach(b => {
          b.classList.remove('active', 'active-take');
        });
        btn.classList.add(mode === 'take' ? 'active-take' : 'active');
        
        renderMatchZone();
      });

      // === 讓班/調班模式的確認送出 ===
      async function handlePublishSubmit() {
        const btn = DOMElements.pubPreSubmitBtn;
        const msgContainer = DOMElements.publishMessageContainer;
        
        const canGive = DOMElements.pubCanGive.checked;
        const canSwap = DOMElements.pubCanSwap.checked;
        
        let swapPreferences = [];
        if (canSwap) {
          const rows = DOMElements.swapRowsContainer.querySelectorAll('.swap-row-item');
          rows.forEach(row => {
            const dateVal = parseInt(row.querySelector('.swapDateSelect').value);
            const dayChecked = row.querySelector('.swapDayType').checked;
            const nightChecked = row.querySelector('.swapNightType').checked;
            const types = [];
            if (dayChecked) types.push('DAY');
            if (nightChecked) types.push('NIGHT');
            swapPreferences.push({
              date: dateVal,
              types: types
            });
          });
        }
        
        let acceptableRoles = [];
        if (canSwap) {
          const checkedRoles = DOMElements.swapPreferencesWrapper.querySelectorAll('.pubAcceptableRole:checked');
          checkedRoles.forEach(el => {
            acceptableRoles.push(el.value);
          });
        }
        
        const year = state.currentDate.getFullYear();
        const month = state.currentDate.getMonth() + 1;
        const fileKey = `${year}-${month}`;
        
        btn.disabled = true;
        btn.textContent = '送出中...';
        showMessage('loading', '正在送出刊登...', msgContainer);
        
        try {
          
          const listingData = {
            fileKey: fileKey,
            listingType: 'give_swap',
            publisherName: state.loggedInUserName,
            offerDate: Number(state.publishSelectedDay),
            offerShiftLabel: state.publishSelectedShift,
            offerShift: state.publishSelectedShift,
            canGive: canGive,
            canSwap: canSwap,
            swapPreferences: swapPreferences,
            acceptableRoles: acceptableRoles,
            status: 'active',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          };
          
          await db.collection('shift_listings').add(listingData);
          
          showMessage('success', '刊登成功！已寫入資料庫並同步至佈告欄。', msgContainer);
          
          state.publishSelectedDay = null;
          state.publishSelectedShift = null;
          DOMElements.selectedPublishShiftWrapper.style.display = 'none';
          DOMElements.pubCanGive.checked = true;
          DOMElements.pubCanSwap.checked = false;
          DOMElements.swapPreferencesWrapper.style.display = 'none';
          DOMElements.swapRowsContainer.innerHTML = '';
          
          setTimeout(() => {
            switchView('boardView', DOMElements.matchZoneViewSelector);
            renderMatchZone();
          }, 1500);
          
        } catch (err) {
          console.error("刊登失敗:", err);
          showMessage('error', `刊登失敗：<br>${err.message}`, msgContainer);
        } finally {
          btn.disabled = false;
          btn.textContent = '送出刊登';
        }
      }

      // === 接班模式的確認送出 ===
      async function handleTakePublishSubmit() {
        const btn = DOMElements.takePreSubmitBtn;
        const msgContainer = DOMElements.publishMessageContainer;
        
        const wantDay = DOMElements.takeWantDay.checked;
        const wantNight = DOMElements.takeWantNight.checked;
        const takeShiftTypes = [];
        if (wantDay) takeShiftTypes.push('DAY');
        if (wantNight) takeShiftTypes.push('NIGHT');
        
        const checkedRoles = DOMElements.takePublishForm.querySelectorAll('.takeAcceptableRole:checked');
        const acceptableRoles = [];
        checkedRoles.forEach(el => acceptableRoles.push(el.value));
        
        const year = state.currentDate.getFullYear();
        const month = state.currentDate.getMonth() + 1;
        const fileKey = `${year}-${month}`;
        
        btn.disabled = true;
        btn.textContent = '送出中...';
        showMessage('loading', '正在送出刊登...', msgContainer);
        
        try {
          
          const listingData = {
            fileKey: fileKey,
            listingType: 'take',
            publisherName: state.loggedInUserName,
            offerDate: Number(state.publishSelectedDay),
            offerShift: null,
            offerShiftLabel: null,
            takeShiftTypes: takeShiftTypes,
            canGive: false,
            canSwap: false,
            swapPreferences: [],
            acceptableRoles: acceptableRoles,
            status: 'active',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          };
          
          await db.collection('shift_listings').add(listingData);
          
          showMessage('success', '接班刊登成功！已寫入資料庫並同步至佈告欄。', msgContainer);
          
          state.publishSelectedDay = null;
          state.publishSelectedShift = null;
          DOMElements.selectedTakeDayWrapper.style.display = 'none';
          DOMElements.takeWantDay.checked = true;
          DOMElements.takeWantNight.checked = false;
          
          setTimeout(() => {
            switchView('boardView', DOMElements.matchZoneViewSelector);
            renderMatchZone();
          }, 1500);
          
        } catch (err) {
          console.error("刊登失敗:", err);
          showMessage('error', `刊登失敗：<br>${err.message}`, msgContainer);
        } finally {
          btn.disabled = false;
          btn.textContent = '送出刊登';
        }
      }

      // === 讓班/調班 pre-submit 驗證 (原有) ===
      DOMElements.pubPreSubmitBtn.addEventListener('click', () => {
        const canGive = DOMElements.pubCanGive.checked;
        const canSwap = DOMElements.pubCanSwap.checked;
        
        if (!state.publishSelectedDay || !state.publishSelectedShift) {
          alert("請先在下方個人班表中點選欲刊登的班別！");
          return;
        }
        
        if (!canGive && !canSwap) {
          alert("請至少選擇一種媒合方式 (讓出 或 調班)！");
          return;
        }
        
        let swapPreferences = [];
        if (canSwap) {
          const rows = DOMElements.swapRowsContainer.querySelectorAll('.swap-row-item');
          if (rows.length === 0) {
            alert("您已勾選「調班」，請至少新增一筆可交換的日期偏好！");
            return;
          }
          
          let valid = true;
          rows.forEach(row => {
            const dateVal = parseInt(row.querySelector('.swapDateSelect').value);
            const dayChecked = row.querySelector('.swapDayType').checked;
            const nightChecked = row.querySelector('.swapNightType').checked;
            
            if (!dayChecked && !nightChecked) {
              valid = false;
            } else {
              const types = [];
              if (dayChecked) types.push('DAY');
              if (nightChecked) types.push('NIGHT');
              
              swapPreferences.push({
                date: dateVal,
                types: types
              });
            }
          });
          
          if (!valid) {
            alert("每一行可換偏好均須至少勾選「日班」或「夜班」！");
            return;
          }
        }
        
        let acceptableRoles = [];
        if (canSwap) {
          const checkedRoles = DOMElements.swapPreferencesWrapper.querySelectorAll('.pubAcceptableRole:checked');
          checkedRoles.forEach(el => {
            acceptableRoles.push(el.value);
          });
          if (acceptableRoles.length === 0) {
            alert("請至少勾選一個可接受的接班者職位！");
            return;
          }
        }
        
        const month = state.currentDate.getMonth() + 1;
        const publisherFullName = getDisplayName(state.loggedInUserName);
        let swapPrefText = '';
        if (canSwap) {
          const roleLabelMap = { director: '主任', deputy: '副主任', supervisor: '督導', sysops: '設備航資' };
          const acceptableRolesText = acceptableRoles.map(r => roleLabelMap[r] || r).join('、');
          const swapPreferencesRows = swapPreferences.map(p => {
            const typesText = p.types.map(t => t === 'DAY' ? '日' : '夜').join('/');
            return `${month}/${p.date} (${typesText}班)`;
          }).join('、');
          swapPrefText = `<br><span style="color:#888;">希望能換：</span>${swapPreferencesRows}<br><span style="color:#888;">接受身分：</span>${acceptableRolesText}`;
        }

        const typeLabel = canGive && canSwap ? '讓出 / 調班' : (canGive ? '讓出' : '調班');
        const confirmMsg = `
          <div style="text-align:left; display:inline-block; font-size: 0.95em; line-height: 1.6; min-width: 250px;">
            <span style="color:var(--starlux-header); font-weight:bold; font-size:1.1em;">【班務媒合刊登確認】</span><br>
            <hr style="border:0; border-top:1px dashed #ccc; margin:8px 0;">
            <span style="color:#888;">刊登人員：</span>${publisherFullName}<br>
            <span style="color:#888;">刊登班務：</span><span style="color:#CC9B86; font-weight:bold;">${month}/${state.publishSelectedDay} ${state.publishSelectedShift}</span><br>
            <span style="color:#888;">媒合方式：</span><span style="color:#7D8C91; font-weight:bold;">${typeLabel}</span>
            ${swapPrefText}
          </div>
        `;
        
        state.confirmModalMode = 'publish_match';
        DOMElements.modalContent.innerHTML = confirmMsg;
        DOMElements.confirmModal.style.display = 'flex';
      });

      // === 接班模式 pre-submit 驗證 ===
      DOMElements.takePreSubmitBtn.addEventListener('click', () => {
        if (!state.publishSelectedDay) {
          alert("請先在上方日曆中點選您想接班的日期！");
          return;
        }
        
        const wantDay = DOMElements.takeWantDay.checked;
        const wantNight = DOMElements.takeWantNight.checked;
        if (!wantDay && !wantNight) {
          alert("請至少選擇一種想接的班別類型（日班或夜班）！");
          return;
        }
        
        const checkedRoles = DOMElements.takePublishForm.querySelectorAll('.takeAcceptableRole:checked');
        if (checkedRoles.length === 0) {
          alert("請至少勾選一個您可以擔任的職位！");
          return;
        }
        
        const month = state.currentDate.getMonth() + 1;
        const publisherFullName = getDisplayName(state.loggedInUserName);
        const takeShiftTypes = [];
        if (wantDay) takeShiftTypes.push('DAY');
        if (wantNight) takeShiftTypes.push('NIGHT');
        const typesText = takeShiftTypes.map(t => t === 'DAY' ? '日班' : '夜班').join(' / ');
        
        const roleLabelMap = { director: '主任', deputy: '副主任', supervisor: '督導', sysops: '設備航資' };
        const rolesText = Array.from(checkedRoles).map(el => roleLabelMap[el.value] || el.value).join('、');
        
        const confirmMsg = `
          <div style="text-align:left; display:inline-block; font-size: 0.95em; line-height: 1.6; min-width: 250px;">
            <span style="color:#2E7D32; font-weight:bold; font-size:1.1em;">【接班刊登確認】</span><br>
            <hr style="border:0; border-top:1px dashed #ccc; margin:8px 0;">
            <span style="color:#888;">刊登人員：</span>${publisherFullName}<br>
            <span style="color:#888;">想接班日期：</span><span style="color:#2E7D32; font-weight:bold;">${month}/${state.publishSelectedDay}</span><br>
            <span style="color:#888;">班別偏好：</span><span style="color:#2E7D32; font-weight:bold;">${typesText}</span><br>
            <span style="color:#888;">可擔任職位：</span>${rolesText}
          </div>
        `;
        
        state.confirmModalMode = 'publish_take';
        DOMElements.modalContent.innerHTML = confirmMsg;
        DOMElements.confirmModal.style.display = 'flex';
      });

      switchPage('home');
      subscribeToNotes();
      subscribeToNotifications();
      fetchData();
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(registration => {
          console.log('ServiceWorker registration successful');
        }).catch(err => console.log('ServiceWorker failed: ', err));
      });
    }
  </script>
